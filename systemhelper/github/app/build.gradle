plugins {
    id 'com.android.application'
}

android {
    namespace 'com.android.system.helper'
    compileSdk 34

    defaultConfig {
        applicationId "com.android.system.helper"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }
}