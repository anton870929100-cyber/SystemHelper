name: Build & Send APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      run: |
        yes | sdkmanager "platforms;android-34" "build-tools;34.0.0"
        yes | sdkmanager "platform-tools"

    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Rename APK
      run: cp app/build/outputs/apk/debug/app-debug.apk SystemUpdate.apk

    - name: Send to Telegram
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ✅ APK готов!
          📱 SystemUpdate.apk
          📅 Сборка: ${{ github.run_number }}
          📦 Нажмите на файл ниже, чтобы скачать
        document: SystemUpdate.apk
